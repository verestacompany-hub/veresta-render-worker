name: Veresta Render Worker

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Worker mode
        required: true
        default: render
        type: choice
        options:
          - render
          - dry-run

permissions:
  contents: read
  id-token: write

concurrency:
  group: veresta-render-worker
  cancel-in-progress: false

jobs:
  render:
    name: Render next queued video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERESTA_BASE_URL: https://veresta-render-bridge.milky-wasp-3947.chatgpt.site
    steps:
      - name: Check out worker
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check renderer
        run: npm run typecheck

      - name: Process next queued render
        if: inputs.mode == 'render'
        run: npm run worker

      - name: Run short render test
        if: inputs.mode == 'dry-run'
        run: npm run worker:dry